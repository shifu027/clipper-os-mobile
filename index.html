<!DOCTYPE html>
<html lang="pt-PT" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ClipperOS">
    <meta name="theme-color" content="#f8fafc">
    
    <title>Clipper Studio OS</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc; 
            -webkit-tap-highlight-color: transparent; 
        }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 6px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        
        .glass-panel {
            background: rgba(255, 255, 255, 0.95); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(226, 232, 240, 0.8);
        }

        .fade-in { animation: fadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .toast-enter { animation: slideIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        .toast-exit { animation: slideOut 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideIn { from { opacity: 0; transform: translate(-50%, 20px); } to { opacity: 1; transform: translate(-50%, 0); } }
        @keyframes slideOut { from { opacity: 1; transform: translate(-50%, 0); } to { opacity: 0; transform: translate(-50%, 20px); } }
        
        .nav-item.active { background-color: #eff6ff; color: #2563eb; font-weight: 600; border-right: 3px solid #2563eb; }
        .nav-item.active i { color: #2563eb; }

        .tag-pill { @apply text-[10px] font-bold px-2 py-0.5 rounded-full uppercase tracking-wider border; }
        .tag-viral { @apply bg-orange-50 text-orange-600 border-orange-200; }
        .tag-venda { @apply bg-green-50 text-green-600 border-green-200; }
        .tag-engajamento { @apply bg-purple-50 text-purple-600 border-purple-200; }
        .tag-reaproveitavel { @apply bg-blue-50 text-blue-600 border-blue-200; }
        .tag-default { @apply bg-slate-100 text-slate-600 border-slate-200; }
    </style>
</head>
<body class="text-slate-800 selection:bg-blue-200 selection:text-blue-900 overflow-hidden flex h-screen w-full">

    <!-- SIDEBAR (Desktop) -->
    <aside class="w-64 bg-white border-r border-slate-200 flex-col hidden md:flex z-20 shadow-sm">
        <div class="p-6 border-b border-slate-100">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-tr from-slate-800 to-slate-900 text-white rounded-xl flex items-center justify-center shadow-md">
                    <i class="fa-solid fa-layer-group"></i>
                </div>
                <div>
                    <h1 class="font-bold text-lg leading-tight text-slate-900">Clipper OS</h1>
                    <p class="text-[10px] text-blue-600 font-bold uppercase tracking-wider">Studio App</p>
                </div>
            </div>
        </div>
        <nav class="flex-1 overflow-y-auto py-4 space-y-1" id="desktop-nav"></nav>
        <div class="p-4 border-t border-slate-100">
            <button onclick="ClipperApp.exportDataCSV()" class="w-full flex items-center gap-3 px-4 py-2 text-sm text-slate-500 hover:bg-slate-50 rounded-xl transition-colors"><i class="fa-solid fa-cloud-arrow-down"></i> Backup Dados</button>
            <button onclick="ClipperApp.editConfig()" class="w-full flex items-center gap-3 px-4 py-2 text-sm text-slate-500 hover:bg-slate-50 rounded-xl transition-colors mt-1"><i class="fa-solid fa-gear"></i> Setup</button>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
        <!-- Mobile Header -->
        <header class="glass-panel md:hidden sticky top-0 z-20 px-5 py-4 flex justify-between items-center shadow-sm">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 bg-slate-900 text-white rounded-xl flex items-center justify-center"><i class="fa-solid fa-layer-group text-sm"></i></div>
                <h1 class="font-bold text-base text-slate-900">Clipper OS</h1>
            </div>
            <button onclick="ClipperApp.editConfig()" class="w-9 h-9 rounded-full bg-slate-100 flex items-center justify-center text-slate-500"><i class="fa-solid fa-gear"></i></button>
        </header>

        <!-- View Container -->
        <div id="app-content" class="flex-1 overflow-y-auto p-4 md:p-8 pb-24 md:pb-8 relative"></div>

        <!-- BOTTOM NAV (Mobile) -->
        <nav class="glass-panel md:hidden fixed bottom-0 left-0 w-full z-20 border-t border-slate-200 flex justify-around p-2 pb-safe" id="mobile-nav"></nav>
    </main>

    <!-- TOAST CONTAINER -->
    <div id="toast-container" class="fixed top-4 md:top-auto md:bottom-6 left-1/2 transform -translate-x-1/2 z-[100] flex flex-col gap-2 pointer-events-none w-[90%] max-w-sm"></div>

    <!-- GLOBAL MODAL -->
    <div id="global-modal" class="fixed inset-0 z-[60] hidden items-end sm:items-center justify-center p-0 sm:p-4">
        <div class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm cursor-pointer transition-opacity" onclick="ClipperApp.closeModal()"></div>
        <div class="bg-white w-full max-w-lg rounded-t-3xl sm:rounded-3xl shadow-2xl relative z-10 flex flex-col max-h-[90vh] modal-content transform transition-transform duration-300 translate-y-full" id="global-modal-content">
            <div class="p-5 border-b border-slate-100 flex justify-between items-center shrink-0">
                <h2 class="text-lg font-bold text-slate-800" id="modal-title">Título</h2>
                <button onclick="ClipperApp.closeModal()" class="w-8 h-8 bg-slate-100 rounded-full flex items-center justify-center text-slate-500 hover:bg-slate-200 transition"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="p-5 overflow-y-auto flex-1 space-y-4" id="modal-body"></div>
            <div class="p-5 border-t border-slate-100 bg-slate-50 shrink-0 rounded-b-3xl" id="modal-footer"></div>
        </div>
    </div>

    <script>
        const ClipperApp = {
            state: {
                currentView: 'dashboard',
                config: { canal: '', nicho: '', frequencia: '2', cloudLinks: {}, equipe: 'Eu' },
                library: [], // { id, title, type, tags[], link, status, notes }
                clips: [], // { id, title, minIn, minOut, gancho, cta, platform, status }
                routine: [], // { id, date, time, platform, assetId, source, isPosted }
                history: [], // { id, assetId, title, platform, category, postedAt, performance, link }
                geminiTool: 'ganchos',
                filterLib: 'all',
                filterDate: new Date().toISOString().split('T')[0] // Data selecionada no calendário
            },

            views: [
                { id: 'dashboard', icon: 'fa-house', name: 'Dashboard' },
                { id: 'pipeline', icon: 'fa-calendar-days', name: 'Calendário' },
                { id: 'library', icon: 'fa-photo-film', name: 'Biblioteca' },
                { id: 'clipper', icon: 'fa-scissors', name: 'Clipador' },
                { id: 'history', icon: 'fa-chart-pie', name: 'Analytics' },
                { id: 'gemini', icon: 'fa-wand-magic-sparkles', name: 'IA Studio' }
            ],

            predefinedTags: ['viral', 'venda', 'institucional', 'engajamento', 'reaproveitavel', 'evergreen', 'tutorial'],
            platforms: ['TikTok', 'Instagram Reels', 'YouTube Shorts', 'Kwai', 'LinkedIn', 'Facebook'],

            init() {
                this.loadData();
                if (!this.state.config.canal) {
                    this.state.currentView = 'setup';
                }
                this.renderNav();
                this.render();
            },

            generateId() { return Date.now().toString(36) + Math.random().toString(36).substr(2); },

            loadData() {
                const s = localStorage.getItem('clipperOS_StateV2');
                if (s) {
                    try { this.state = { ...this.state, ...JSON.parse(s) }; } 
                    catch(e) { console.error("Erro ao carregar dados", e); }
                }
                // Preencher rotina vazia para os próximos dias se não existir
                if (this.state.routine.length === 0 && this.state.config.canal) {
                    this.generateAutoRoutine();
                }
            },

            saveData() { localStorage.setItem('clipperOS_StateV2', JSON.stringify(this.state)); },

            changeView(viewId) {
                this.state.currentView = viewId;
                this.saveData();
                this.renderNav();
                this.render();
            },

            // --- AUTO SCHEDULER ---
            generateAutoRoutine() {
                // Não sobrecreve o que já existe, apenas garante que hoje tem slots
                const freq = parseInt(this.state.config.frequencia) || 2;
                const times = freq === 1 ? ['18:00'] : freq === 2 ? ['11:30', '18:30'] : freq === 3 ? ['11:00', '14:30', '19:00'] : ['10:00', '13:00', '17:00', '20:00'];
                const today = new Date().toISOString().split('T')[0];
                
                const hasToday = this.state.routine.some(r => r.date === today);
                if(!hasToday) {
                    times.forEach(t => {
                        this.state.routine.push({
                            id: this.generateId(), date: today, time: t, platform: 'Automático', assetId: null, source: null, isPosted: false
                        });
                    });
                    this.saveData();
                }
            },

            // --- RENDERERS ---
            renderNav() {
                const createNavBtn = (v, isMobile) => `
                    <button onclick="ClipperApp.changeView('${v.id}')" class="w-full flex ${isMobile ? 'flex-col justify-center items-center py-2' : 'items-center gap-3 px-6 py-3.5 mb-1'} text-slate-500 hover:bg-slate-50 transition-colors nav-item ${this.state.currentView === v.id ? 'active' : ''}">
                        <i class="fa-solid ${v.icon} ${isMobile ? 'text-xl mb-1' : 'text-lg w-5 text-center'}"></i>
                        <span class="${isMobile ? 'text-[10px]' : 'text-sm font-medium'}">${v.name}</span>
                    </button>
                `;
                document.getElementById('desktop-nav').innerHTML = this.views.map(v => createNavBtn(v, false)).join('');
                document.getElementById('mobile-nav').innerHTML = this.views.slice(0, 5).map(v => createNavBtn(v, true)).join('');
            },

            render() {
                const content = document.getElementById('app-content');
                content.innerHTML = '';
                if (this.state.currentView === 'setup') return this.renderSetup(content);

                let html = '';
                switch(this.state.currentView) {
                    case 'dashboard': html = this.getDashboardHTML(); break;
                    case 'library': html = this.getLibraryHTML(); break;
                    case 'clipper': html = this.getClipperHTML(); break;
                    case 'pipeline': html = this.getPipelineHTML(); break;
                    case 'history': html = this.getHistoryHTML(); break;
                    case 'gemini': html = this.getGeminiHTML(); break;
                }
                content.innerHTML = `<div class="fade-in max-w-6xl mx-auto w-full">${html}</div>`;
            },

            // ================== VIEWS HTML ================== //

            getDashboardHTML() {
                const today = new Date().toISOString().split('T')[0];
                const todaysRoutine = this.state.routine.filter(r => r.date === today).sort((a,b) => a.time.localeCompare(b.time));
                
                const postsDone = this.state.history.filter(h => h.postedAt.startsWith(today)).length;
                const totalGoal = todaysRoutine.length || parseInt(this.state.config.frequencia);
                const progress = totalGoal === 0 ? 0 : Math.min(100, Math.round((postsDone / totalGoal) * 100));

                const pendingClips = this.state.clips.filter(c => c.status !== 'aprovado' && c.status !== 'postado').length;
                const libraryItems = this.state.library.length;

                let routineHTML = todaysRoutine.length === 0 ? `<div class="text-center py-8 text-slate-400 bg-slate-50 rounded-2xl border border-slate-100">Nenhum post agendado para hoje.</div>` : 
                    todaysRoutine.map(slot => {
                        const asset = slot.assetId ? (slot.source === 'library' ? this.state.library.find(a=>a.id===slot.assetId) : this.state.clips.find(c=>c.id===slot.assetId)) : null;
                        const isPosted = slot.isPosted;
                        return `
                        <div class="flex items-center gap-4 p-4 bg-white rounded-2xl border ${isPosted ? 'border-green-200 bg-green-50/30' : 'border-slate-200'} mb-3 shadow-sm transition-all hover:shadow-md">
                            <div class="font-bold ${isPosted ? 'text-green-600' : 'text-slate-800'} w-14 text-center">
                                <div class="text-lg">${slot.time}</div>
                                <div class="text-[9px] uppercase tracking-wide text-slate-400">${slot.platform.split(' ')[0]}</div>
                            </div>
                            <div class="flex-1 border-l border-slate-100 pl-4">
                                ${asset ? `
                                    <div class="text-sm font-bold ${isPosted ? 'text-slate-500 line-through' : 'text-slate-800'}">${asset.title}</div>
                                    <div class="text-[10px] text-slate-400 mt-1 flex gap-2 items-center">
                                        <span class="bg-slate-100 px-1.5 py-0.5 rounded text-slate-500"><i class="fa-solid ${slot.source === 'library' ? 'fa-folder' : 'fa-scissors'}"></i> ${slot.source==='library'?'Biblioteca':'Clipador'}</span>
                                        ${asset.link ? `<a href="${asset.link}" target="_blank" class="text-blue-500 hover:underline"><i class="fa-solid fa-cloud"></i> Ver Ficheiro</a>` : ''}
                                    </div>
                                ` : `<div class="text-xs text-slate-400 italic">Horário livre. Clique em "Agendar" na biblioteca.</div>`}
                            </div>
                            ${asset && !isPosted ? `<button onclick="ClipperApp.postScheduledAsset('${slot.id}')" class="w-10 h-10 bg-blue-600 text-white rounded-full flex items-center justify-center hover:bg-blue-700 shadow-md transition-transform active:scale-95"><i class="fa-solid fa-paper-plane"></i></button>` : ''}
                            ${isPosted ? `<div class="w-10 h-10 text-green-500 flex items-center justify-center text-xl"><i class="fa-solid fa-circle-check"></i></div>` : ''}
                        </div>
                    `}).join('');

                return `
                    <div class="flex justify-between items-end mb-6">
                        <div>
                            <h2 class="text-2xl md:text-3xl font-bold text-slate-800">Olá, Equipa ${this.state.config.canal}!</h2>
                            <p class="text-slate-500 text-sm mt-1">Resumo das operações de conteúdo de hoje.</p>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4 mb-8">
                        <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm">
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1"><i class="fa-solid fa-bullseye text-blue-500 mr-1"></i> Progresso Hoje</p>
                            <div class="flex items-end gap-2"><h3 class="text-2xl font-bold text-slate-800">${progress}%</h3></div>
                            <div class="w-full bg-slate-100 h-1.5 rounded-full mt-2 overflow-hidden"><div class="bg-blue-500 h-full" style="width:${progress}%"></div></div>
                        </div>
                        <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm">
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1"><i class="fa-solid fa-check-double text-green-500 mr-1"></i> Publicados</p>
                            <h3 class="text-2xl font-bold text-slate-800">${postsDone} <span class="text-xs font-normal text-slate-400">/ ${totalGoal}</span></h3>
                        </div>
                        <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm cursor-pointer hover:border-amber-300" onclick="ClipperApp.changeView('clipper')">
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1"><i class="fa-solid fa-scissors text-amber-500 mr-1"></i> Clipes Pendentes</p>
                            <h3 class="text-2xl font-bold text-slate-800">${pendingClips}</h3>
                        </div>
                        <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm cursor-pointer hover:border-purple-300" onclick="ClipperApp.changeView('library')">
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1"><i class="fa-solid fa-photo-film text-purple-500 mr-1"></i> Acervo (Prontos)</p>
                            <h3 class="text-2xl font-bold text-slate-800">${libraryItems}</h3>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div class="lg:col-span-2">
                            <div class="flex justify-between items-center mb-4">
                                <h3 class="font-bold text-lg text-slate-800">Timeline Editorial</h3>
                                <button onclick="ClipperApp.changeView('pipeline')" class="text-sm text-blue-600 font-bold hover:underline">Ver Calendário</button>
                            </div>
                            <div class="bg-slate-50 p-2 md:p-4 rounded-3xl border border-slate-200">
                                ${routineHTML}
                            </div>
                        </div>
                        
                        <div>
                            <div class="bg-gradient-to-br from-slate-800 to-slate-900 rounded-3xl p-6 text-white shadow-lg mb-6">
                                <h3 class="font-bold mb-2 flex items-center gap-2"><i class="fa-brands fa-google-drive"></i> Nuvem Sincronizada</h3>
                                <p class="text-xs text-slate-300 mb-4">Acesso rápido aos diretórios do projeto.</p>
                                <div class="space-y-2">
                                    ${['Bruto', 'Editados', 'Assets', 'Gestão'].map(p => `
                                        <button onclick="window.open('${this.state.config.cloudLinks[p] || '#'}', '_blank')" class="w-full bg-white/10 hover:bg-white/20 border border-white/10 p-3 rounded-xl flex items-center gap-3 transition text-sm text-left">
                                            <i class="fa-solid fa-folder text-blue-400"></i> ${p}
                                        </button>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            },

            getLibraryHTML() {
                const lib = this.state.library;
                const libHTML = lib.length === 0 ? `<div class="col-span-full py-16 text-center text-slate-400 border-2 border-dashed border-slate-200 rounded-3xl bg-white"><i class="fa-solid fa-folder-open text-5xl mb-4 text-slate-300"></i><p>Nenhum conteúdo no acervo central.</p></div>` :
                    lib.map(item => `
                        <div class="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm hover:shadow-md transition flex flex-col justify-between h-full group">
                            <div>
                                <div class="flex justify-between items-start mb-3">
                                    <div class="flex gap-1 flex-wrap">
                                        ${item.tags.map(t => `<span class="tag-pill tag-${this.predefinedTags.includes(t)?t:'default'}">${t}</span>`).join('')}
                                    </div>
                                    <button onclick="ClipperApp.deleteLibraryItem('${item.id}')" class="text-slate-300 hover:text-red-500 transition-colors"><i class="fa-solid fa-trash"></i></button>
                                </div>
                                <h4 class="font-bold text-slate-800 text-base leading-tight mb-2">${item.title}</h4>
                                <p class="text-xs text-slate-500 mb-4 flex items-center gap-1.5"><i class="fa-solid ${item.type.includes('Vídeo')?'fa-video':'fa-image'} text-slate-400"></i> ${item.type}</p>
                            </div>
                            <div class="flex gap-2 border-t border-slate-100 pt-4">
                                <button onclick="ClipperApp.openScheduleModal('${item.id}', 'library')" class="flex-1 bg-slate-900 text-white text-xs py-2.5 rounded-xl font-bold hover:bg-slate-800 shadow-md transition-transform active:scale-95"><i class="fa-solid fa-calendar-plus mr-1"></i> Agendar</button>
                                ${item.link ? `<button onclick="window.open('${item.link}', '_blank')" class="bg-slate-100 text-slate-600 text-xs px-4 py-2.5 rounded-xl hover:bg-slate-200 font-medium transition-colors"><i class="fa-solid fa-cloud-arrow-down"></i></button>` : ''}
                            </div>
                        </div>
                    `).join('');

                return `
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                        <h2 class="text-2xl font-bold text-slate-800">Biblioteca Central</h2>
                        <div class="flex gap-2 w-full md:w-auto">
                            <button onclick="ClipperApp.openAddLibraryModal()" class="w-full md:w-auto bg-blue-600 text-white px-5 py-2.5 rounded-xl text-sm font-bold shadow-md hover:bg-blue-700 transition flex items-center justify-center gap-2"><i class="fa-solid fa-plus"></i> Novo Conteúdo</button>
                        </div>
                    </div>
                    
                    <div class="flex gap-2 overflow-x-auto hide-scrollbar pb-4 mb-2">
                        <button class="tag-pill bg-slate-800 text-white whitespace-nowrap">Todos</button>
                        ${this.predefinedTags.map(t => `<button class="tag-pill tag-${t} whitespace-nowrap bg-white hover:bg-slate-50">#${t}</button>`).join('')}
                    </div>

                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                        ${libHTML}
                    </div>
                `;
            },

            getClipperHTML() {
                const clips = this.state.clips;
                const statusStyles = { 
                    'bruto': { color: 'slate', icon: 'fa-box', label: 'Bruto' },
                    'editando': { color: 'amber', icon: 'fa-scissors', label: 'Em Edição' },
                    'aprovado': { color: 'green', icon: 'fa-check-double', label: 'Aprovado' }
                };
                
                const clipsHTML = clips.length === 0 ? `<div class="py-16 text-center text-slate-400 border-2 border-dashed border-slate-200 rounded-3xl w-full bg-white"><i class="fa-solid fa-film text-5xl mb-4 text-slate-300"></i><p>A fila de cortes está vazia. Comece a decupar um vídeo longo.</p></div>` :
                    clips.map(c => {
                        const st = statusStyles[c.status];
                        return `
                        <div class="bg-white border-l-4 border-${st.color}-500 rounded-r-2xl rounded-l-md p-5 shadow-sm mb-4 hover:shadow-md transition">
                            <div class="flex justify-between items-start mb-3">
                                <div class="flex items-center gap-2">
                                    <span class="text-[10px] font-bold px-2 py-0.5 rounded bg-${st.color}-50 text-${st.color}-600 uppercase flex items-center gap-1 border border-${st.color}-100"><i class="fa-solid ${st.icon}"></i> ${st.label}</span>
                                    <span class="text-xs text-slate-500 font-bold bg-slate-100 px-2 py-0.5 rounded-md"><i class="fa-regular fa-clock text-slate-400"></i> ${c.minIn} - ${c.minOut}</span>
                                </div>
                                <div class="flex gap-1">
                                    <button onclick="ClipperApp.editClipStatus('${c.id}')" class="text-slate-400 hover:text-blue-500 w-8 h-8 rounded-lg flex items-center justify-center transition-colors"><i class="fa-solid fa-arrows-rotate"></i></button>
                                    <button onclick="ClipperApp.deleteClip('${c.id}')" class="text-slate-400 hover:text-red-500 w-8 h-8 rounded-lg flex items-center justify-center transition-colors"><i class="fa-solid fa-trash"></i></button>
                                </div>
                            </div>

                                </ol>
                            </div>
                        </div>

            },

            getPipelineHTML() {
                // Generate next 7 days for the calendar header
                const today = new Date();
                const days = [];
                for(let i=0; i<7; i++) {
                    const d = new Date(today);
                    d.setDate(today.getDate() + i);
                    days.push({ 
                        dateStr: d.toISOString().split('T')[0], 
                        dayName: d.toLocaleDateString('pt-PT', {weekday:'short'}), 
                        dayNum: d.getDate() 
                    });
                }

                const selectedDateStr = this.state.filterDate;
                
                const calendarHTML = days.map(d => `
                    <button onclick="ClipperApp.setFilterDate('${d.dateStr}')" class="flex-1 flex flex-col items-center p-3 rounded-2xl transition-all border ${selectedDateStr === d.dateStr ? 'bg-blue-600 text-white border-blue-600 shadow-md' : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'}">
                        <span class="text-[10px] uppercase font-bold opacity-80 mb-1">${d.dayName}</span>
                        <span class="text-xl font-bold leading-none">${d.dayNum}</span>
                    </button>
                `).join('');

                // Scheduled items for selected date
                const scheduledSlots = this.state.routine.filter(r => r.date === selectedDateStr).sort((a,b) => a.time.localeCompare(b.time));
                
                const slotsHTML = scheduledSlots.length === 0 ? `<div class="text-center py-10 text-slate-400 border-2 border-dashed border-slate-200 rounded-2xl bg-white"><p>Sem agendamentos para este dia.</p><button onclick="ClipperApp.addEmptySlot('${selectedDateStr}')" class="mt-3 text-sm font-bold text-blue-500 hover:underline">+ Adicionar Horário Manual</button></div>` :
                    scheduledSlots.map(slot => {
                        const asset = slot.assetId ? (slot.source === 'library' ? this.state.library.find(a=>a.id===slot.assetId) : this.state.clips.find(c=>c.id===slot.assetId)) : null;
                        return `
                        <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-200 mb-3 flex gap-4 items-center group">
                            <div class="font-bold text-slate-700 w-12 text-center text-lg">${slot.time}</div>
                            <div class="flex-1 border-l border-slate-100 pl-4 py-1">
                                ${asset ? `
                                    <div class="flex justify-between items-start">
                                        <div>
                                            <span class="text-[9px] font-bold text-slate-500 uppercase tracking-wider bg-slate-100 px-2 py-0.5 rounded mb-1 inline-block">${slot.platform}</span>
                                            <h4 class="text-sm font-bold text-slate-800">${asset.title}</h4>
                                        </div>
                                        <button onclick="ClipperApp.unscheduleAsset('${slot.id}')" class="text-slate-300 hover:text-red-500 p-1"><i class="fa-solid fa-xmark"></i></button>
                                    </div>
                                ` : `
                                    <div class="flex justify-between items-center">
                                        <div class="text-xs text-slate-400 italic">Slot disponível (${slot.platform})</div>
                                        <button onclick="ClipperApp.deleteEmptySlot('${slot.id}')" class="text-slate-300 hover:text-red-500 p-1"><i class="fa-solid fa-trash"></i></button>
                                    </div>
                                `}
                            </div>
                        </div>
                    `}).join('') + `<button onclick="ClipperApp.addEmptySlot('${selectedDateStr}')" class="w-full border-2 border-dashed border-slate-200 text-slate-400 hover:border-blue-400 hover:text-blue-500 hover:bg-blue-50/50 rounded-2xl p-3 text-center text-sm font-bold transition-colors">+ Novo Horário</button>`;

                // Unassigned assets ready to schedule
                const readyAssets = [...this.state.library, ...this.state.clips.filter(c => c.status === 'aprovado')].filter(asset => !this.state.routine.some(r => r.assetId === asset.id) && !this.state.history.some(h => h.assetId === asset.id));

                const readyHTML = readyAssets.length === 0 ? `<div class="text-xs text-slate-400 text-center py-6">O Banco de Conteúdo pronto está vazio. Aprove cortes ou adicione à biblioteca.</div>` :
                    readyAssets.map(item => `
                        <div class="bg-white p-3 rounded-xl shadow-sm border border-slate-200 mb-2 hover:border-blue-300 transition-colors">
                            <div class="flex justify-between items-start mb-1">
                                <div class="text-[9px] font-bold text-slate-400 uppercase">${item.type || 'Corte Aprovado'}</div>
                            </div>
                            <h4 class="text-sm font-bold text-slate-800 mb-3 leading-tight line-clamp-2">${item.title}</h4>
                            <button onclick="ClipperApp.openScheduleModal('${item.id}', '${item.type ? 'library' : 'clip'}')" class="w-full bg-slate-50 hover:bg-blue-50 text-slate-600 hover:text-blue-600 border border-slate-200 hover:border-blue-200 text-xs py-2 rounded-lg font-bold transition-colors"><i class="fa-solid fa-calendar-plus mr-1"></i> Agendar</button>
                        </div>
                    `).join('');

                return `
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="text-2xl font-bold text-slate-800">Calendário Editorial</h2>
                    </div>
                    
                    <div class="flex gap-2 overflow-x-auto hide-scrollbar pb-2 mb-6 snap-x">
                        ${calendarHTML}
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <div class="lg:col-span-2">
                            <h3 class="font-bold text-slate-700 mb-4">Programação para ${new Date(selectedDateStr).toLocaleDateString('pt-PT')}</h3>
                            <div class="bg-slate-50 p-4 rounded-3xl border border-slate-200">
                                ${slotsHTML}
                            </div>
                        </div>
                        
                        <div>
                            <div class="bg-slate-100 rounded-3xl p-4 border border-slate-200 h-full max-h-[600px] flex flex-col">
                                <h3 class="font-bold text-slate-700 mb-4 flex items-center gap-2"><i class="fa-solid fa-box-open text-blue-500"></i> Banco (Prontos)</h3>
                                <div class="overflow-y-auto flex-1 pr-2 hide-scrollbar">
                                    ${readyHTML}
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            },

                                    <select onchange="ClipperApp.updatePerformance('${h.id}', this.value)" class="bg-slate-50 border border-slate-200 text-xs font-bold rounded-xl px-3 py-2.5 focus:ring-2 focus:ring-blue-500 outline-none w-full md:w-32 ${h.performance==='Viral'?'text-orange-600 bg-orange-50 border-orange-200':'text-slate-600'}">
                                        <option value="Pendente" ${h.performance==='Pendente'?'selected':''}>⏳ Avaliar</option>
                                        <option value="Baixo" ${h.performance==='Baixo'?'selected':''}>Baixo</option>
                                        <option value="Médio" ${h.performance==='Médio'?'selected':''}>Médio</option>
                                        <option value="Alto" ${h.performance==='Alto'?'selected':''}>Alto</option>
                                        <option value="Viral" ${h.performance==='Viral'?'selected':''}>🔥 Viral</option>
                                    </select>
                                </div>
                                <button onclick="ClipperApp.reutilizarConteudo('${h.id}')" class="bg-blue-50 text-blue-600 text-xs font-bold px-4 py-2.5 rounded-xl hover:bg-blue-100 transition whitespace-nowrap self-end border border-blue-100 shadow-sm active:scale-95"><i class="fa-solid fa-recycle mr-1"></i> Reciclar</button>
                            </div>
                        </div>
                    `).join('');

                return `
                    <h2 class="text-2xl font-bold text-slate-800 mb-6">Controle & Analytics</h2>
                    
                    <div class="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4 mb-8">
                        <div class="bg-white p-5 rounded-3xl border border-slate-200 shadow-sm text-center">
                            <div class="text-3xl font-bold text-slate-800">${stats.total}</div>
                            <div class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mt-1">Total Posts</div>
                        </div>
                        <div class="bg-orange-50 p-5 rounded-3xl border border-orange-200 shadow-sm text-center">
                            <div class="text-3xl font-bold text-orange-600">${stats.viral}</div>
                            <div class="text-[10px] font-bold text-orange-500 uppercase tracking-wider mt-1">Virais 🔥</div>
                        </div>
                        <div class="bg-slate-900 p-5 rounded-3xl border border-slate-800 shadow-lg text-center">
                            <div class="text-3xl font-bold text-white">${stats.tiktok}</div>
                            <div class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mt-1">TikToks</div>
                        </div>
                        <div class="bg-gradient-to-tr from-purple-600 to-pink-500 p-5 rounded-3xl shadow-lg text-center">

            getGeminiHTML() {
                return `
                    <div class="bg-gradient-to-br from-purple-800 via-purple-600 to-pink-500 rounded-3xl p-8 md:p-12 text-white shadow-xl relative overflow-hidden mb-8">
                        <i class="fa-solid fa-wand-magic-sparkles absolute -right-4 -bottom-4 text-[150px] opacity-10 transform -rotate-12"></i>
                        <h2 class="text-3xl md:text-4xl font-bold mb-3 relative z-10 tracking-tight">Studio IA</h2>
                        <p class="text-purple-100 text-sm md:text-base max-w-lg relative z-10 leading-relaxed">Conectado ao modelo Gemini. Gere scripts de alta retenção, títulos magnéticos e descubra ângulos virais em segundos.</p>

                    <div class="bg-white rounded-3xl shadow-sm border border-slate-200 p-6 md:p-8">
                        <div class="space-y-6">
                            <div>
                                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 ml-1">Assunto / Tema Base</label>
                                <input type="text" id="gemini-topic" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-5 py-4 text-sm focus:ring-2 focus:ring-purple-500 outline-none placeholder:text-slate-400 transition-all" placeholder="Ex: 3 formas de investir com pouco dinheiro...">

                            <div>
                                <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2 ml-1">O que pretende criar?</label>
                                <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                                    ${['ganchos:🎣 Ganchos', 'titulos:📝 Títulos', 'legenda:🏷️ Legendas', 'roteiro:🎬 Roteiro'].map(t => {
                                        const [id, label] = t.split(':');
                                        return `<button onclick="ClipperApp.setGeminiTool('${id}')" id="btn-tool-${id}" class="tool-btn py-3.5 rounded-xl text-sm font-bold border transition-all ${this.state.geminiTool === id ? 'bg-purple-100 text-purple-700 border-purple-300 shadow-sm' : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'}">${label}</button>`;
                                    }).join('')}
                                </div>
                            </div>

                            <button onclick="ClipperApp.generateIdeasWithGemini()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-xl shadow-lg shadow-slate-900/20 hover:bg-slate-800 active:scale-[0.98] transition-all mt-2">
                                <i class="fa-solid fa-bolt text-yellow-400 mr-2"></i> Gerar Conteúdo
                            </button>
                        </div>

                        <div id="gemini-results" class="mt-8 pt-8 border-t border-slate-100">
                            <div class="text-center py-12 px-4 text-slate-400 text-sm border-2 border-dashed border-slate-200 rounded-2xl bg-slate-50">
                                <i class="fa-solid fa-robot text-4xl mb-4 text-slate-300"></i>
                                <p>Aguardando instruções. Os resultados gerados aparecerão aqui prontos a copiar.</p>
                            </div>
                        </div>
                    </div>
                `;
            },

            // ================== MODALS & UI LOGIC ================== //
            
            openModal(title, bodyHTML, footerHTML) {
                document.getElementById('modal-title').innerText = title;
                document.getElementById('modal-body').innerHTML = bodyHTML;
                document.getElementById('modal-footer').innerHTML = footerHTML;
                
                const modal = document.getElementById('global-modal');
                const content = document.getElementById('global-modal-content');
                
                modal.classList.remove('hidden'); modal.classList.add('flex');
                setTimeout(() => {
                    content.classList.remove('translate-y-full'); content.classList.add('translate-y-0');
                }, 10);
            },

            closeModal() {
                const modal = document.getElementById('global-modal');
                const content = document.getElementById('global-modal-content');
                content.classList.remove('translate-y-0'); content.classList.add('translate-y-full');
                setTimeout(() => {
                    modal.classList.add('hidden'); modal.classList.remove('flex');
                }, 300);
            },

            setFilterDate(dateStr) {
                this.state.filterDate = dateStr;
                this.render();
            },

            // --- LIBRARY LOGIC ---
            openAddLibraryModal() {
                const body = `
                    <div class="space-y-4">
                        <div><label class="block text-xs font-bold text-slate-400 mb-1">Título</label>
                        <input type="text" id="lib-title" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-blue-500"></div>
                        
                        <div class="grid grid-cols-2 gap-3">
                            <div><label class="block text-xs font-bold text-slate-400 mb-1">Formato</label>
                            <select id="lib-type" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm outline-none"><option>Vídeo Reels/Shorts</option><option>Vídeo Longo</option><option>Carrossel/Imagem</option></select></div>
                            <div><label class="block text-xs font-bold text-slate-400 mb-1">Responsável</label>
                            <input type="text" id="lib-team" value="${this.state.config.equipe}" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm outline-none"></div>
                        </div>

                        <div><label class="block text-xs font-bold text-slate-400 mb-1">Tags (Vírgula para separar)</label>
                        <input type="text" id="lib-tags" placeholder="ex: viral, venda, dica" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm outline-none"></div>
                        
                        <div><label class="block text-xs font-bold text-slate-400 mb-1">Link Nuvem (Opcional)</label>
                        <input type="url" id="lib-link" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm outline-none"></div>
                    </div>
                `;
                const footer = `<button onclick="ClipperApp.saveLibraryItem()" class="w-full bg-blue-600 text-white font-bold py-3.5 rounded-xl shadow-md">Salvar no Acervo</button>`;
                this.openModal('Novo Conteúdo (Biblioteca)', body, footer);
            },

            saveLibraryItem() {
                const title = document.getElementById('lib-title').value.trim();
                if(!title) return this.showToast('Título obrigatório.', 'error');
                
                const tagsRaw = document.getElementById('lib-tags').value;
                const tags = tagsRaw ? tagsRaw.split(',').map(t => t.trim().toLowerCase()).filter(t => t) : [];
                
                this.state.library.unshift({
                    id: this.generateId(), title, type: document.getElementById('lib-type').value, 
                    tags, link: document.getElementById('lib-link').value, team: document.getElementById('lib-team').value
                });
                this.saveData(); this.closeModal(); this.render();
                this.showToast('Conteúdo guardado!', 'success');
            },

            deleteLibraryItem(id) {
                if(confirm('Apagar permanentemente da biblioteca?')) {
                    this.state.library = this.state.library.filter(i => i.id !== id);
                    // Clear from routine if scheduled
                    this.state.routine.forEach(r => { if(r.assetId === id) r.assetId = null; });
                    this.saveData(); this.render();
                }
            },

            // --- CLIPPER LOGIC ---
            openAddClipModal() {
                const platOptions = this.platforms.map(p => `<option value="${p}">${p}</option>`).join('');
                const body = `
                    <div class="space-y-4">
                        <div><label class="block text-xs font-bold text-slate-400 mb-1">Título do Corte</label>
                        <input type="text" id="clip-title" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-amber-500"></div>
                        
                        <div class="grid grid-cols-2 gap-3">
                            <div><label class="block text-xs font-bold text-slate-400 mb-1">Min Inicial</label>
                            <input type="text" id="clip-in" placeholder="00:00" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm outline-none text-center"></div>
                            <div><label class="block text-xs font-bold text-slate-400 mb-1">Min Final</label>
                            <input type="text" id="clip-out" placeholder="00:00" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm outline-none text-center"></div>
                        </div>

                        <div><label class="block text-xs font-bold text-slate-400 mb-1">Gancho (O que retém os 3s iniciais?)</label>
                        <textarea id="clip-gancho" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm outline-none h-16 resize-none"></textarea></div>
                        
                        <div class="grid grid-cols-2 gap-3">
                            <div><label class="block text-xs font-bold text-slate-400 mb-1">Plataforma Foco</label>
                            <select id="clip-plat" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-3 text-xs outline-none">${platOptions}</select></div>
                            <div><label class="block text-xs font-bold text-slate-400 mb-1">CTA</label>
                            <input type="text" id="clip-cta" placeholder="Siga para mais..." class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-3 text-xs outline-none"></div>
                        </div>
                    </div>
                `;
                const footer = `<button onclick="ClipperApp.saveClip()" class="w-full bg-slate-900 text-white font-bold py-3.5 rounded-xl shadow-md">Decupar Corte</button>`;
                this.openModal('Novo Corte (Clip)', body, footer);
            },

            saveClip() {
                const title = document.getElementById('clip-title').value.trim();
                if(!title) return this.showToast('Insira um título.', 'error');
                
                this.state.clips.unshift({
                    id: this.generateId(), title, minIn: document.getElementById('clip-in').value || '00:00', 
                    minOut: document.getElementById('clip-out').value || '00:00', gancho: document.getElementById('clip-gancho').value, 
                    platform: document.getElementById('clip-plat').value, cta: document.getElementById('clip-cta').value, status: 'bruto'
                });
                this.saveData(); this.closeModal(); this.render();
                this.showToast('Corte inserido no fluxo!', 'success');
            },

            editClipStatus(id) {
                const clip = this.state.clips.find(c => c.id === id);
                if(!clip) return;
                clip.status = clip.status === 'bruto' ? 'editando' : clip.status === 'editando' ? 'aprovado' : 'bruto';
                this.saveData(); this.render();
                this.showToast(`Movido para: ${clip.status}`, 'info');
            },

            deleteClip(id) {
                if(confirm('Apagar corte?')) {
                    this.state.clips = this.state.clips.filter(c => c.id !== id);
                    this.state.routine.forEach(r => { if(r.assetId === id) r.assetId = null; });
                    this.saveData(); this.render();
                }
            },

            // --- SCHEDULING (PIPELINE) LOGIC ---
            openScheduleModal(assetId, source) {
                const platOptions = this.platforms.map(p => `<option value="${p}">${p}</option>`).join('');
                const defaultDate = this.state.filterDate || new Date().toISOString().split('T')[0];

                const body = `
                    <div class="space-y-4">
                        <input type="hidden" id="sched-asset" value="${assetId}">
                        <input type="hidden" id="sched-source" value="${source}">
                        
                        <div><label class="block text-xs font-bold text-slate-400 mb-1">Data de Publicação</label>
                        <input type="date" id="sched-date" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm outline-none focus:ring-2 focus:ring-blue-500" value="${defaultDate}"></div>
                        
                        <div class="grid grid-cols-2 gap-3">
                            <div><label class="block text-xs font-bold text-slate-400 mb-1">Hora</label>
                            <input type="time" id="sched-time" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm outline-none" value="12:00"></div>
                            
                            <div><label class="block text-xs font-bold text-slate-400 mb-1">Plataforma</label>
                            <select id="sched-plat" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-3 text-sm outline-none">${platOptions}</select></div>
                        </div>
                    </div>
                `;
                const footer = `<button onclick="ClipperApp.saveSchedule()" class="w-full bg-blue-600 text-white font-bold py-3.5 rounded-xl shadow-md">Confirmar Agendamento</button>`;
                this.openModal('Agendar Conteúdo', body, footer);
            },

            saveSchedule() {
                const assetId = document.getElementById('sched-asset').value;
                const source = document.getElementById('sched-source').value;
                const date = document.getElementById('sched-date').value;
                const time = document.getElementById('sched-time').value;
                const platform = document.getElementById('sched-plat').value;

                if(!date || !time) return this.showToast('Data e hora obrigatórias.', 'error');

                this.state.routine.push({
                    id: this.generateId(), date, time, platform, assetId, source, isPosted: false
                });

                this.state.filterDate = date; // Muda a view do calendário para o dia agendado
                this.saveData(); this.closeModal(); this.changeView('pipeline');
                this.showToast('Conteúdo agendado com sucesso!', 'success');
            },

            unscheduleAsset(slotId) {
                const slotIndex = this.state.routine.findIndex(r => r.id === slotId);
                if(slotIndex > -1) { 
                    this.state.routine[slotIndex].assetId = null; 
                    this.state.routine[slotIndex].source = null;
                    this.saveData(); this.render(); 
                }
            },

            addEmptySlot(date) {
                this.state.routine.push({
                    id: this.generateId(), date, time: '12:00', platform: 'Pendente', assetId: null, source: null, isPosted: false
                });
                this.saveData(); this.render();
            },

            deleteEmptySlot(slotId) {
                this.state.routine = this.state.routine.filter(r => r.id !== slotId);
                this.saveData(); this.render();
            },

            // --- HISTORY & POSTING LOGIC ---
            postScheduledAsset(slotId) {
                const slot = this.state.routine.find(r => r.id === slotId);
                if(!slot || !slot.assetId) return;

                const asset = slot.source === 'library' ? this.state.library.find(a=>a.id===slot.assetId) : this.state.clips.find(c=>c.id===slot.assetId);
                if(!asset) return;

                // Salva no histórico
                this.state.history.unshift({
                    id: this.generateId(), assetId: asset.id, title: asset.title, platform: slot.platform, 
                    category: asset.type || 'Corte Editado', postedAt: new Date().toISOString(), performance: 'Pendente',
                    link: asset.link || ''
                });
                
                slot.isPosted = true;
                this.saveData(); this.render();
                this.showToast('Marcado como Publicado! Registado no Analytics.', 'success');
            },

            updatePerformance(historyId, val) {
                const h = this.state.history.find(x => x.id === historyId);
                if(h) { h.performance = val; this.saveData(); this.render(); }
            },

            reutilizarConteudo(historyId) {
                const h = this.state.history.find(x => x.id === historyId);
                if(!h) return;

                // Duplica para a biblioteca com a tag #reaproveitavel
                this.state.library.unshift({
                    id: this.generateId(), title: `[REPOST] ${h.title}`, type: h.category, 
                    tags: ['reaproveitavel'], link: h.link || '', team: this.state.config.equipe
                });

                this.saveData();
                this.showToast('Conteúdo copiado para a Biblioteca (Pronto a reciclar).', 'success');
            },

            // --- SETUP & CONFIG ---
            renderSetup(container) {
                container.innerHTML = `
                    <div class="max-w-lg mx-auto fade-in mt-6 md:mt-12 bg-white p-8 rounded-3xl shadow-xl border border-slate-100">
                        <div class="text-center mb-8">
                            <div class="w-20 h-20 bg-slate-900 text-white rounded-3xl mx-auto flex items-center justify-center text-3xl mb-5 shadow-lg"><i class="fa-solid fa-layer-group"></i></div>
                            <h1 class="text-2xl font-bold text-slate-800">Clipper Studio OS</h1>
                            <p class="text-sm text-slate-500 mt-2">Configure o ambiente de trabalho (Workspace) da sua equipa.</p>
                        </div>
                        <div class="space-y-5">
                            <div class="grid grid-cols-2 gap-4">
                                <div class="col-span-2 md:col-span-1"><label class="block text-xs font-bold text-slate-400 mb-1 uppercase tracking-wider">Nome do Projeto</label><input type="text" id="cfg-canal" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:border-blue-500 transition" value="${this.state.config.canal}" placeholder="Ex: Agência XYZ"></div>
                                <div class="col-span-2 md:col-span-1"><label class="block text-xs font-bold text-slate-400 mb-1 uppercase tracking-wider">Nicho Principal</label><input type="text" id="cfg-nicho" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none focus:border-blue-500 transition" value="${this.state.config.nicho}" placeholder="Ex: Finanças"></div>
                            </div>
                            
                            <div>
                                <label class="block text-xs font-bold text-slate-400 mb-1 uppercase tracking-wider">Meta Diária (Cadência)</label>
                                <select id="cfg-freq" class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 outline-none">
                                    <option value="1" ${this.state.config.frequencia==='1'?'selected':''}>1 Post por dia</option>
                                    <option value="2" ${this.state.config.frequencia==='2'?'selected':''}>2 Posts por dia</option>
                                    <option value="3" ${this.state.config.frequencia==='3'?'selected':''}>3 Posts por dia</option>
                                    <option value="5" ${this.state.config.frequencia==='5'?'selected':''}>5 Posts por dia (Agressivo)</option>
                                </select>
                            </div>

                            <div class="border-t border-slate-100 pt-5 mt-5">
                                <h3 class="text-sm font-bold text-slate-800 mb-3"><i class="fa-solid fa-cloud text-blue-500 mr-1"></i> Diretórios Nuvem (Opcional)</h3>
                                <div class="grid grid-cols-2 gap-3">
                                    ${['Bruto', 'Editados', 'Assets', 'Gestão'].map(p => `
                                    <div><label class="block text-[10px] font-bold text-slate-400 mb-1">${p}</label><input type="url" id="cfg-link-${p}" class="w-full bg-slate-50 border border-slate-200 rounded-lg px-3 py-2 text-xs outline-none" placeholder="Colar link..." value="${this.state.config.cloudLinks[p]||''}"></div>
                                    `).join('')}
                                </div>
                            </div>

                            <button onclick="ClipperApp.saveSetup()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-xl mt-6 shadow-md hover:bg-blue-700 active:scale-[0.98] transition-all">Guardar & Entrar no OS</button>
                            ${this.state.config.canal ? `<button onclick="ClipperApp.resetConfig()" class="w-full text-slate-400 text-xs font-semibold py-2 mt-2 hover:text-red-500 transition-colors">Apagar todos os dados do sistema</button>` : ''}
                        </div>
                    </div>
                `;
            },

            saveSetup() {
                const c = document.getElementById('cfg-canal').value.trim();
                if(!c) return this.showToast('Insira o nome do projeto.', 'error');
                
                this.state.config.canal = c;
                this.state.config.nicho = document.getElementById('cfg-nicho').value;
                this.state.config.frequencia = document.getElementById('cfg-freq').value;
                
                ['Bruto', 'Editados', 'Assets', 'Gestão'].forEach(p => {
                    this.state.config.cloudLinks[p] = document.getElementById(`cfg-link-${p}`).value;
                });

                this.generateAutoRoutine();
                this.changeView('dashboard');
                this.showToast('Configurações aplicadas!', 'success');
            },

            editConfig() { this.state.currentView = 'setup'; this.render(); },

            resetConfig() {
                if(confirm("ATENÇÃO: Vai apagar TUDO (Histórico, Biblioteca, Clipes, Configurações). Deseja continuar?")) {
                    localStorage.removeItem('clipperOS_StateV2');
                    localStorage.removeItem('clipperOS_Date');
                    location.reload();
                }
            },

            exportDataCSV() {
                let csvContent = "data:text/csv;charset=utf-8,";
                csvContent += "ID,Titulo,Plataforma,Categoria,Data Postagem,Performance,Link\n";
                this.state.history.forEach(row => {
                    const cleanTitle = row.title.replace(/,/g, ' '); // Evitar quebrar CSV
                    csvContent += `${row.id},${cleanTitle},${row.platform},${row.category},${row.postedAt},${row.performance},${row.link}\n`;
                });
                const encodedUri = encodeURI(csvContent);
                const link = document.createElement("a");
                link.setAttribute("href", encodedUri);
                link.setAttribute("download", `ClipperOS_Analytics_${new Date().toISOString().split('T')[0]}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                this.showToast('Exportação concluída com sucesso!', 'success');
            },

            // --- GEMINI AI LOGIC ---
            setGeminiTool(tool) {
                this.state.geminiTool = tool;
                ['ganchos', 'titulos', 'legenda', 'roteiro'].forEach(t => {
                    const btn = document.getElementById('btn-tool-' + t);
                    if(btn) btn.className = `tool-btn py-3.5 rounded-xl text-sm font-bold border transition-all ${this.state.geminiTool === t ? 'bg-purple-100 text-purple-700 border-purple-300 shadow-sm' : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'}`;
                });
            },

            async generateIdeasWithGemini() {
                const resultsDiv = document.getElementById('gemini-results');
                const topicInput = document.getElementById('gemini-topic').value.trim();
                const tool = this.state.geminiTool;
                const nicho = this.state.config.nicho;
                
                resultsDiv.innerHTML = '<div class="text-center py-12"><i class="fa-solid fa-wand-magic-sparkles fa-bounce text-4xl text-purple-500 mb-4"></i><p class="text-sm text-slate-500 font-medium">A analisar tendências de mercado e a gerar resposta... ✨</p></div>';

                const apiKey = ""; 
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                
                let prompt = `Como estrategista de social media, atuando no nicho de "${nicho}". O tema do conteúdo é: "${topicInput || 'Ideias gerais em alta'}". `;
                if(tool==='ganchos') prompt += 'Crie 5 ganchos verbais ou visuais altamente retentivos para os primeiros 3 segundos do vídeo. Responda em bullet points curtos.';
                if(tool==='titulos') prompt += 'Escreva 5 opções de títulos curtos, clickbaits justificados e virais. Retorne uma lista numerada.';
                if(tool==='legenda') prompt += 'Escreva 1 legenda envolvente para TikTok/Reels, adicione uma Call to Action geradora de comentários e liste as 5 melhores hashtags.';
                if(tool==='roteiro') prompt += 'Estruture um roteiro para vídeo de 60s dividido em: 1) Gancho (0-3s), 2) Desenvolvimento rápido (3-50s), 3) CTA imperativo (50-60s).';

                const payload = { contents: [{ parts: [{ text: prompt }] }], systemInstruction: { parts: [{ text: "Seja criativo, moderno e vá direto ao ponto. Responda em Português (PT-PT ou PT-BR aceitável)." }] } };

                try {
                    const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    const data = await response.json();
                    const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "Falha na comunicação com o servidor IA.";
                    const formatted = text.replace(/\*\*(.*?)\*\*/g, '<strong class="text-slate-800">$1</strong>').replace(/\n/g, '<br>');
                    
                    resultsDiv.innerHTML = `
                        <div class="bg-white p-6 rounded-2xl shadow-sm border border-purple-100 relative group">
                            <div class="text-sm text-slate-600 leading-relaxed" id="gemini-copy-text">${formatted}</div>
                            <button onclick="navigator.clipboard.writeText(document.getElementById('gemini-copy-text').innerText); ClipperApp.showToast('Copiado!', 'success');" class="mt-4 w-full bg-slate-50 hover:bg-slate-100 text-slate-600 border border-slate-200 font-semibold py-2.5 rounded-xl text-xs transition-colors flex justify-center items-center gap-2">
                                <i class="fa-regular fa-copy"></i> Copiar Texto Gerado
                            </button>
                        </div>`;
                } catch (error) {
                    resultsDiv.innerHTML = '<div class="text-center py-6 text-red-500 bg-red-50 rounded-2xl border border-red-100">Erro de conexão. Verifique se a Chave API está configurada no código.</div>';
                }
            },

            showToast(message, type = 'info') {
                const container = document.getElementById('toast-container');
                const toast = document.createElement('div');
                const styles = { 
                    success: 'bg-green-800 text-green-50', error: 'bg-red-800 text-red-50', 
                    warning: 'bg-amber-800 text-amber-50', info: 'bg-slate-800 text-slate-50' 
                };
                const icons = { success: 'fa-check-circle', error: 'fa-triangle-exclamation', warning: 'fa-exclamation', info: 'fa-info-circle' };
                
                toast.className = `${styles[type]} px-4 py-3 rounded-xl shadow-xl flex items-center gap-3 text-sm font-medium toast-enter pointer-events-auto`;
                toast.innerHTML = `<i class="fa-solid ${icons[type]} text-lg opacity-90"></i><span>${message}</span>`;
                container.appendChild(toast);
                
                setTimeout(() => {
                    toast.classList.remove('toast-enter'); toast.classList.add('toast-exit');
                    setTimeout(() => toast.remove(), 300);
                }, 3000);
            }
        };

        window.onload = () => ClipperApp.init();
    </script>
</body>
</html>
