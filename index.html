<!DOCTYPE html>
<html lang="en" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Clipper OS">
    <meta name="theme-color" content="#f8fafc">
    <meta name="description" content="Content management app for social media creators and clipper workflows">

    <!-- Camada 1: Content Security Policy (CSP) -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://unpkg.com 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; img-src 'self' data:; connect-src 'self' https://*.supabase.co wss://*.supabase.co; font-src 'self' https://cdnjs.cloudflare.com;">

    <link rel="manifest" href="./manifest.webmanifest">
    <link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192x192.png">
    <link rel="apple-touch-icon" href="./icons/icon-192x192.png">

    <!-- Subresource Integrity (SRI) & Sanitização (Placeholder para Bibliotecas) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <title>Clipper OS</title>
    <style>
        canvas#three-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
        }
        #auth-screen, body {
            background: transparent !important;
        }
    </style>
</head>
<body class="text-slate-800 overflow-hidden flex h-screen w-full selection:bg-blue-200 selection:text-blue-900">
    <canvas id="three-bg"></canvas>

    <!-- AUTH SCREEN -->
    <div id="auth-screen" class="fixed inset-0 z-[200] bg-slate-50 flex items-center justify-center">
      <div class="w-full max-w-md mx-auto px-6">
        <div class="text-center mb-8">
          <div class="mx-auto mb-4">
            <img src="logo.png?v=1" alt="Clipper OS Logo" class="w-20 h-20 rounded-2xl shadow-lg mx-auto object-cover border-4 border-white/10">
          </div>
          <h1 class="text-2xl font-bold text-slate-900">Clipper OS</h1>
          <p class="text-sm text-slate-500 mt-1">Content Studio</p>
        </div>

        <!-- Auth Tabs -->
        <div class="flex bg-slate-100 rounded-xl p-1 mb-6">
          <button id="tab-login" class="flex-1 py-2.5 text-sm font-semibold rounded-lg transition-all bg-white text-slate-900 shadow-sm">Entrar</button>
          <button id="tab-signup" class="flex-1 py-2.5 text-sm font-semibold rounded-lg transition-all text-slate-500">Criar Conta</button>
        </div>

        <!-- Error Message -->
        <div id="auth-error" class="hidden mb-4 p-3 bg-red-50 border border-red-200 rounded-xl text-red-600 text-sm"></div>
        <!-- Success Message -->
        <div id="auth-success" class="hidden mb-4 p-3 bg-green-50 border border-green-200 rounded-xl text-green-600 text-sm"></div>

        <!-- Login Form -->
        <form id="login-form" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">E-mail</label>
            <input type="email" id="login-email" required placeholder="seu@email.com"
              class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white text-slate-900 placeholder-slate-400 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Senha</label>
            <input type="password" id="login-password" required placeholder="••••••••" minlength="6"
              class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white text-slate-900 placeholder-slate-400 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
          </div>
          <button type="submit" id="login-btn"
            class="w-full py-3 bg-gradient-to-r from-slate-800 to-slate-900 text-white font-semibold rounded-xl shadow-md hover:shadow-lg transition-all flex items-center justify-center gap-2">
            <span>Entrar</span>
            <i id="login-spinner" class="fa-solid fa-spinner fa-spin hidden"></i>
          </button>
          <button type="button" id="forgot-password-btn" class="w-full text-sm text-blue-600 hover:text-blue-700 font-medium mt-2">
            Esqueci minha senha
          </button>
        </form>

        <!-- Sign Up Form -->
        <form id="signup-form" class="space-y-4 hidden">
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Nome Completo</label>
            <input type="text" id="signup-name" required placeholder="Seu nome completo"
              class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white text-slate-900 placeholder-slate-400 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">E-mail</label>
            <input type="email" id="signup-email" required placeholder="seu@email.com"
              class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white text-slate-900 placeholder-slate-400 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Senha</label>
            <input type="password" id="signup-password" required placeholder="Mínimo 6 caracteres" minlength="6"
              class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white text-slate-900 placeholder-slate-400 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">Confirmar Senha</label>
            <input type="password" id="signup-password-confirm" required placeholder="Repita a senha" minlength="6"
              class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white text-slate-900 placeholder-slate-400 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
          </div>
          <button type="submit" id="signup-btn"
            class="w-full py-3 bg-gradient-to-r from-blue-600 to-blue-700 text-white font-semibold rounded-xl shadow-md hover:shadow-lg transition-all flex items-center justify-center gap-2">
            <span>Criar Conta</span>
            <i id="signup-spinner" class="fa-solid fa-spinner fa-spin hidden"></i>
          </button>
        </form>

        <!-- Forgot Password Form (hidden by default) -->
        <form id="forgot-form" class="space-y-4 hidden">
          <p class="text-sm text-slate-600">Digite seu e-mail para receber um link de redefinição de senha.</p>
          <div>
            <label class="block text-sm font-medium text-slate-700 mb-1.5">E-mail</label>
            <input type="email" id="forgot-email" required placeholder="seu@email.com"
              class="w-full px-4 py-3 rounded-xl border border-slate-200 bg-white text-slate-900 placeholder-slate-400 focus:ring-2 focus:ring-blue-500 focus:border-transparent outline-none transition">
          </div>
          <button type="submit" id="forgot-btn"
            class="w-full py-3 bg-slate-700 text-white font-semibold rounded-xl shadow-md hover:shadow-lg transition-all flex items-center justify-center gap-2">
            <span>Enviar Link</span>
            <i id="forgot-spinner" class="fa-solid fa-spinner fa-spin hidden"></i>
          </button>
          <button type="button" id="back-to-login-btn" class="w-full text-sm text-blue-600 hover:text-blue-700 font-medium">
            ← Voltar ao login
          </button>
        </form>
      </div>
    </div>

    <!-- SIDEBAR (Desktop) -->
    <aside id="desktop-sidebar" class="w-64 bg-white border-r border-slate-200 flex-col hidden md:flex z-20 shadow-sm">
        <div class="p-6 border-b border-slate-100">
            <div class="flex items-center gap-3">
                <img src="logo.png?v=1" alt="Logo" class="w-10 h-10 rounded-xl shadow-md object-cover">
                <div>
                    <h1 class="font-bold text-lg leading-tight text-slate-900">Clipper OS</h1>
                    <p class="text-[10px] text-blue-600 font-bold uppercase tracking-wider">Content Studio</p>
                </div>
            </div>
        </div>
        <nav class="flex-1 overflow-y-auto py-4 space-y-1" id="desktop-nav"></nav>
        <div class="p-4 border-t border-slate-100">
            <div id="sidebar-user-info" class="hidden px-4 py-2 mb-1 text-xs text-slate-400 truncate"></div>
            <button id="btn-backup" class="w-full flex items-center gap-3 px-4 py-2 text-sm text-slate-500 hover:bg-slate-50 rounded-xl transition-colors"><i class="fa-solid fa-cloud-arrow-down"></i> Backup Data</button>
            <button id="btn-settings" class="w-full flex items-center gap-3 px-4 py-2 text-sm text-slate-500 hover:bg-slate-50 rounded-xl transition-colors mt-1"><i class="fa-solid fa-gear"></i> Settings</button>
            <button id="btn-logout" class="w-full flex items-center gap-3 px-4 py-2 text-sm text-red-500 hover:bg-red-50 rounded-xl transition-colors mt-1"><i class="fa-solid fa-right-from-bracket"></i> Sair</button>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 flex flex-col h-screen overflow-hidden relative">
        <!-- Mobile Header -->
        <header class="glass-panel md:hidden sticky top-0 z-20 px-5 py-4 flex justify-between items-center shadow-sm">
            <div class="flex items-center gap-3">
                <img src="logo.png?v=1" alt="Logo" class="w-9 h-9 rounded-xl shadow-sm object-cover">
                <h1 class="font-bold text-base text-slate-900">Clipper OS</h1>
            </div>
            <button id="btn-settings-mobile" class="w-9 h-9 rounded-full bg-slate-100 flex items-center justify-center text-slate-500"><i class="fa-solid fa-gear"></i></button>
        </header>

        <!-- View Container -->
        <div id="app-content" class="flex-1 overflow-y-auto p-4 md:p-8 pb-24 md:pb-8 relative"></div>

        <!-- BOTTOM NAV (Mobile) -->
        <nav class="glass-panel md:hidden fixed bottom-0 left-0 w-full z-20 border-t border-slate-200 flex justify-around p-2 pb-safe" id="mobile-nav"></nav>
    </main>

    <!-- TOAST CONTAINER -->
    <div id="toast-container" class="fixed top-4 md:top-auto md:bottom-6 left-1/2 transform -translate-x-1/2 z-[100] flex flex-col gap-2 pointer-events-none w-[90%] max-w-sm"></div>

    <!-- GLOBAL MODAL -->
    <div id="global-modal" class="fixed inset-0 z-[60] hidden items-end sm:items-center justify-center p-0 sm:p-4">
        <div id="modal-backdrop" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm cursor-pointer transition-opacity"></div>
        <div class="bg-white w-full max-w-lg rounded-t-3xl sm:rounded-3xl shadow-2xl relative z-10 flex flex-col max-h-[90vh] modal-content transform transition-transform duration-300 translate-y-full" id="global-modal-content">
            <div class="p-5 border-b border-slate-100 flex justify-between items-center shrink-0">
                <h2 class="text-lg font-bold text-slate-800" id="modal-title"></h2>
                <button id="modal-close-btn" class="w-8 h-8 bg-slate-100 rounded-full flex items-center justify-center text-slate-500 hover:bg-slate-200 transition"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="p-5 overflow-y-auto flex-1 space-y-4" id="modal-body"></div>
            <div class="p-5 border-t border-slate-100 bg-slate-50 shrink-0 rounded-b-3xl" id="modal-footer"></div>
        </div>
    </div>

    <script type="module" src="/src/main.js"></script>
</body>
</html>
